  <text x="105" y="377" fill="#94A3B8" font-size="10">SMS · Llamadas · Cámara · GPS</text>
  <text x="105" y="392" fill="#94A3B8" font-size="10">Contactos · Linterna · WiFi · Apps</text>
  <text x="105" y="407" fill="#94A3B8" font-size="10">Notificaciones · Salud · Drive Mode</text>


<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 750" font-family="Inter, 'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0A0E17"/>
      <stop offset="100%" stop-color="#000000"/>
    </linearGradient>
    <linearGradient id="glowCian" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00D4FF" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#00D4FF" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="boxPhone" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#131A26"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </linearGradient>
    <linearGradient id="boxPC" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#131A26"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowStrong">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrowCian" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#00D4FF"/>
    </marker>
    <marker id="arrowGray" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#5A6A7A"/>
    </marker>
  </defs>

  <!-- Fondo -->
  <rect width="1200" height="750" fill="url(#bg)"/>

  <!-- Título -->
  <text x="600" y="38" text-anchor="middle" fill="#00D4FF" font-size="22" font-weight="700" letter-spacing="3">J.A.R.V.I.S. — ARQUITECTURA DEL SISTEMA</text>
  <line x1="200" y1="48" x2="1000" y2="48" stroke="#00D4FF" stroke-opacity="0.3" stroke-width="1"/>

  <!-- Partículas -->

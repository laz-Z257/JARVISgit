  <rect x="40" y="80" width="340" height="40" rx="12" fill="#00D4FF" opacity="0.08"/>
  <text x="210" y="105" text-anchor="middle" fill="#00D4FF" font-size="14" font-weight="600" letter-spacing="2">📱 CELULAR (24/7)</text>
  <text x="210" y="640" text-anchor="middle" fill="#5A6A7A" font-size="10" letter-spacing="1">SIEMPRE ACTIVO · MODO AUTÓNOMO</text>


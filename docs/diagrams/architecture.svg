  <text x="105" y="309" fill="#94A3B8" font-size="10">Llama 3.2 1B (~1 GB)</text>

  <!-- Flecha -->
  <line x1="210" y1="321" x2="210" y2="336" stroke="#00D4FF" stroke-width="1.5" marker-end="url(#arrowCian)"/>


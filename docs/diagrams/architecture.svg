  <circle cx="350" cy="90" r="1" fill="#00D4FF" opacity="0.1"/>
  <circle cx="800" cy="130" r="1.5" fill="#00D4FF" opacity="0.12"/>
  <circle cx="1100" cy="100" r="1" fill="#00D4FF" opacity="0.08"/>
  <circle cx="200" cy="650" r="1" fill="#00D4FF" opacity="0.1"/>
  <circle cx="950" cy="680" r="1.5" fill="#00D4FF" opacity="0.12"/>

  <!-- Label: LAN / Casa -->
  <text x="600" y="72" text-anchor="middle" fill="#5A6A7A" font-size="11" letter-spacing="2">RED LOCAL (TUNEL TAILSCALE)</text>


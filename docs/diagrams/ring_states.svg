<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="Inter, 'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0A0E17"/>
      <stop offset="100%" stop-color="#000000"/>
    </linearGradient>
    <filter id="glowCian"><feGaussianBlur stdDeviation="6"/></filter>
    <filter id="glowWhite"><feGaussianBlur stdDeviation="8"/></filter>
    <filter id="glowOrange"><feGaussianBlur stdDeviation="6"/></filter>
    <filter id="glowGreen"><feGaussianBlur stdDeviation="6"/></filter>
    <filter id="glowRed"><feGaussianBlur stdDeviation="4"/></filter>
  </defs>

  <rect width="900" height="500" fill="url(#bg)"/>

  <text x="450" y="32" text-anchor="middle" fill="#00D4FF" font-size="18" font-weight="700" letter-spacing="3">ESTADOS DEL ANILLO — ARC RING</text>
  <line x1="150" y1="42" x2="750" y2="42" stroke="#00D4FF" stroke-opacity="0.3" stroke-width="1"/>

  <!-- IDLE -->
  <g transform="translate(90, 120)">
    <circle cx="60" cy="60" r="55" fill="none" stroke="#00D4FF" stroke-width="2" opacity="0.15" filter="url(#glowCian)"/>
    <circle cx="60" cy="60" r="50" fill="none" stroke="#00D4FF" stroke-width="1.5" opacity="0.3"/>
    <circle cx="60" cy="60" r="45" fill="none" stroke="#00D4FF" stroke-width="1" opacity="0.5"/>
    <!-- Puntos rotando -->
    <circle cx="60" cy="15" r="3" fill="#00D4FF" opacity="0.8">
      <animateTransform attributeName="transform" type="rotate" from="0 60 60" to="360 60 60" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="105" cy="60" r="2.5" fill="#00D4FF" opacity="0.5">
      <animateTransform attributeName="transform" type="rotate" from="120 60 60" to="480 60 60" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="15" cy="60" r="2" fill="#00D4FF" opacity="0.5">
      <animateTransform attributeName="transform" type="rotate" from="240 60 60" to="600 60 60" dur="4s" repeatCount="indefinite"/>
    </circle>
    <text x="60" y="105" text-anchor="middle" fill="#00D4FF" font-size="11" font-weight="600">IDLE</text>
    <text x="60" y="118" text-anchor="middle" fill="#5A6A7A" font-size="9">Pulso lento c/3s</text>
  </g>

  <!-- WAKE WORD -->
  <g transform="translate(270, 120)">
    <circle cx="60" cy="60" r="55" fill="none" stroke="#FFFFFF" stroke-width="2" opacity="0.2" filter="url(#glowWhite)"/>
    <circle cx="60" cy="60" r="48" fill="none" stroke="#FFFFFF" stroke-width="2" opacity="0.5"/>
    <circle cx="60" cy="60" r="35" fill="none" stroke="#FFFFFF" stroke-width="3" opacity="0.8">
      <animate attributeName="r" values="35;50;35" dur="0.8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.8;0.3;0.8" dur="0.8s" repeatCount="indefinite"/>
    </circle>
    <text x="60" y="105" text-anchor="middle" fill="#FFFFFF" font-size="11" font-weight="600">WAKE WORD</text>
    <text x="60" y="118" text-anchor="middle" fill="#5A6A7A" font-size="9">Expansión rápida</text>
  </g>

  <!-- LISTENING -->
  <g transform="translate(450, 120)">
    <circle cx="60" cy="60" r="55" fill="none" stroke="#00D4FF" stroke-width="2" opacity="0.15"/>
    <circle cx="60" cy="60" r="50" fill="none" stroke="#00D4FF" stroke-width="1.5" opacity="0.3"/>
    <circle cx="60" cy="60" r="45" fill="none" stroke="#00D4FF" stroke-width="1" opacity="0.5"/>
    <circle cx="60" cy="60" r="20" fill="#00D4FF" opacity="0.1">
      <animate attributeName="r" values="20;30;15;25;20" dur="1.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="60" cy="30" r="3" fill="#00D4FF" opacity="0.9">
      <animate attributeName="cy" values="30;28;32;27;30" dur="0.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="40" cy="45" r="2.5" fill="#00D4FF" opacity="0.7">
      <animate attributeName="cy" values="45;42;47;43;45" dur="0.4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="80" cy="50" r="2" fill="#00D4FF" opacity="0.6">
      <animate attributeName="cy" values="50;47;52;48;50" dur="0.6s" repeatCount="indefinite"/>
    </circle>
    <text x="60" y="105" text-anchor="middle" fill="#00D4FF" font-size="11" font-weight="600">LISTENING</text>
    <text x="60" y="118" text-anchor="middle" fill="#5A6A7A" font-size="9">Micro-pulsaciones</text>
  </g>

  <!-- PROCESSING -->
  <g transform="translate(630, 120)">
    <circle cx="60" cy="60" r="55" fill="none" stroke="#FF6B35" stroke-width="2" opacity="0.2" filter="url(#glowOrange)"/>
    <circle cx="60" cy="60" r="50" fill="none" stroke="#FF6B35" stroke-width="1.5" opacity="0.3"/>
    <circle cx="60" cy="60" r="45" fill="none" stroke="#FF6B35" stroke-width="1" opacity="0.5"/>
    <!-- Anillos concéntricos girando -->
    <circle cx="60" cy="60" r="35" fill="none" stroke="#FF6B35" stroke-width="2" opacity="0.6" stroke-dasharray="10 15">
      <animateTransform attributeName="transform" type="rotate" from="0 60 60" to="360 60 60" dur="1.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="60" cy="60" r="25" fill="none" stroke="#FF6B35" stroke-width="2" opacity="0.4" stroke-dasharray="8 12">
      <animateTransform attributeName="transform" type="rotate" from="360 60 60" to="0 60 60" dur="1.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="60" cy="60" r="15" fill="none" stroke="#FF6B35" stroke-width="2" opacity="0.8" stroke-dasharray="5 8">
      <animateTransform attributeName="transform" type="rotate" from="0 60 60" to="360 60 60" dur="1s" repeatCount="indefinite"/>
    </circle>
    <text x="60" y="105" text-anchor="middle" fill="#FF6B35" font-size="11" font-weight="600">PROCESSING</text>
    <text x="60" y="118" text-anchor="middle" fill="#5A6A7A" font-size="9">Anillos concéntricos</text>
  </g>

  <!-- SPEAKING -->
  <g transform="translate(90, 290)">
    <circle cx="60" cy="60" r="55" fill="none" stroke="#00FF88" stroke-width="2" opacity="0.2" filter="url(#glowGreen)"/>
    <circle cx="60" cy="60" r="50" fill="none" stroke="#00FF88" stroke-width="1.5" opacity="0.3"/>
    <circle cx="60" cy="60" r="45" fill="none" stroke="#00FF88" stroke-width="1" opacity="0.5"/>
    <circle cx="60" cy="60" r="40" fill="none" stroke="#00FF88" stroke-width="3" opacity="0.6">
      <animate attributeName="r" values="40;48;40" dur="1s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;0.2;0.6" dur="1s" repeatCount="indefinite"/>
    </circle>
    <circle cx="60" cy="60" r="25" fill="#00FF88" opacity="0.08">
      <animate attributeName="r" values="25;35;25" dur="1s" repeatCount="indefinite"/>
    </circle>
    <text x="60" y="105" text-anchor="middle" fill="#00FF88" font-size="11" font-weight="600">SPEAKING</text>
    <text x="60" y="118" text-anchor="middle" fill="#5A6A7A" font-size="9">Ritmo de voz</text>
  </g>

  <!-- STEALTH -->
  <g transform="translate(270, 290)">
    <circle cx="60" cy="60" r="55" fill="none" stroke="#FF3366" stroke-width="2" opacity="0.1" filter="url(#glowRed)"/>
    <circle cx="60" cy="60" r="50" fill="none" stroke="#FF3366" stroke-width="1" opacity="0.2"/>
    <circle cx="60" cy="60" r="45" fill="none" stroke="#FF3366" stroke-width="0.5" opacity="0.3"/>
    <circle cx="60" cy="60" r="10" fill="#FF3366" opacity="0.08">
      <animate attributeName="r" values="10;14;10" dur="4s" repeatCount="indefinite"/>
    </circle>
    <text x="60" y="105" text-anchor="middle" fill="#FF3366" font-size="11" font-weight="600">STEALTH</text>
    <text x="60" y="118" text-anchor="middle" fill="#5A6A7A" font-size="9">Modo sigilo</text>
  </g>

  <!-- ERROR -->
  <g transform="translate(450, 290)">
    <circle cx="60" cy="60" r="55" fill="none" stroke="#FFFFFF" stroke-width="2" opacity="0.1"/>
    <circle cx="60" cy="60" r="50" fill="none" stroke="#FFFFFF" stroke-width="1.5" opacity="0.2"/>
    <circle cx="60" cy="60" r="45" fill="none" stroke="#FFFFFF" stroke-width="1" opacity="0.3"/>
    <circle cx="60" cy="60" r="30" fill="none" stroke="#FFFFFF" stroke-width="2" opacity="0.5">
      <animate attributeName="opacity" values="0.5;0;0.5;0;0.5" dur="0.8s" repeatCount="indefinite"/>
    </circle>
    <text x="60" y="105" text-anchor="middle" fill="#FFFFFF" font-size="11" font-weight="600">ERROR</text>
    <text x="60" y="118" text-anchor="middle" fill="#5A6A7A" font-size="9">Titila 2 veces</text>
  </g>

  <!-- OFFLINE -->
  <g transform="translate(630, 290)">
    <circle cx="60" cy="60" r="55" fill="none" stroke="#5A6A7A" stroke-width="2" opacity="0.2"/>
    <circle cx="60" cy="60" r="50" fill="none" stroke="#5A6A7A" stroke-width="1.5" opacity="0.3"/>
    <circle cx="60" cy="60" r="45" fill="none" stroke="#5A6A7A" stroke-width="1" opacity="0.5"/>
    <circle cx="60" cy="60" r="5" fill="#5A6A7A" opacity="0.15"/>
    <text x="60" y="105" text-anchor="middle" fill="#5A6A7A" font-size="11" font-weight="600">OFFLINE</text>
    <text x="60" y="118" text-anchor="middle" fill="#5A6A7A" font-size="9">Sin conexión</text>
  </g>

  <!-- Nombre de colores debajo -->
  <g transform="translate(90, 430)">
    <rect x="0" y="0" width="16" height="16" rx="3" fill="#00D4FF"/>
    <text x="22" y="12" fill="#94A3B8" font-size="10">Cian #00D4FF</text>
  </g>
  <g transform="translate(210, 430)">
    <rect x="0" y="0" width="16" height="16" rx="3" fill="#FFFFFF"/>
    <text x="22" y="12" fill="#94A3B8" font-size="10">Blanco #FFFFFF</text>
  </g>
  <g transform="translate(340, 430)">
    <rect x="0" y="0" width="16" height="16" rx="3" fill="#FF6B35"/>
    <text x="22" y="12" fill="#94A3B8" font-size="10">Naranja #FF6B35</text>
  </g>
  <g transform="translate(470, 430)">
    <rect x="0" y="0" width="16" height="16" rx="3" fill="#00FF88"/>
    <text x="22" y="12" fill="#94A3B8" font-size="10">Verde #00FF88</text>
  </g>
  <g transform="translate(600, 430)">
    <rect x="0" y="0" width="16" height="16" rx="3" fill="#FF3366"/>
    <text x="22" y="12" fill="#94A3B8" font-size="10">Rojo #FF3366</text>
  </g>
  <g transform="translate(730, 430)">
    <rect x="0" y="0" width="16" height="16" rx="3" fill="#5A6A7A"/>
    <text x="22" y="12" fill="#94A3B8" font-size="10">Gris #5A6A7A</text>
  </g>
</svg>
